<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI检测体验 - 建筑外墙巡检智能报告平台</title>
    <link rel="stylesheet" href="styles.css?v=20260625-1" />
  </head>
  <body class="detail-page trial-experience-page">
    <header class="site-header centered-nav" aria-label="顶部导航">
      <a class="brand" href="index.html#top" aria-label="建筑外墙巡检智能报告平台首页">
        <span class="brand-mark" aria-hidden="true"><span></span><span></span><span></span></span>
        <span class="brand-name">建筑外墙巡检智能报告平台</span>
      </a>
      <nav class="main-nav" aria-label="主导航">
        <a href="index.html#top">首页</a>
        <div class="nav-menu">
          <button class="nav-menu-trigger current" type="button" aria-expanded="false" aria-controls="ai-submenu">
            AI检测能力<i data-lucide="chevron-down" aria-hidden="true"></i>
          </button>
          <div class="nav-submenu" id="ai-submenu" role="menu" aria-label="AI检测能力">
            <a href="crack-detection.html" role="menuitem">裂缝检测</a>
            <a href="spalling-detection.html" role="menuitem">剥落检测</a>
            <a href="hollow-detection.html" role="menuitem">空鼓检测</a>
            <a href="leakage-detection.html" role="menuitem">渗漏检测</a>
            <a href="corrosion-detection.html" role="menuitem">锈蚀检测</a>
            <a href="detection-time.html" role="menuitem">检测时段推荐</a>
          </div>
        </div>
        <a href="project-management.html">项目管理</a>
        <a href="review-workbench.html">审核工作台</a>
        <a href="detection-report.html">检测报告</a>
      </nav>
    </header>

    <main class="trial-experience-shell">
      <section class="trial-experience-header">
        <div>
          <p class="project-kicker">AI DETECTION EXPERIENCE</p>
          <h1>AI检测体验</h1>
          <p>上传外墙照片，直接生成裂缝/剥落标准检测简易报告。</p>
        </div>
        <a class="button secondary" href="index.html#trial">
          <i data-lucide="arrow-left" aria-hidden="true"></i>
          返回首页
        </a>
      </section>

      <section class="trial-experience-grid">
        <div class="trial-upload-panel">
          <div class="trial-panel-heading">
            <div>
              <h2>上传照片</h2>
              <p>单次上传总量不超过 100MB。</p>
            </div>
            <span class="trial-mode-badge">标准检测</span>
          </div>

          <label class="trial-dropzone" for="trial-photo-input">
            <i data-lucide="image-up" aria-hidden="true"></i>
            <strong>选择外墙照片</strong>
            <span>支持 JPG、PNG、WebP 等常见图片格式，可多选</span>
            <em id="trial-upload-summary">尚未选择文件</em>
          </label>
          <input class="sr-only" id="trial-photo-input" type="file" accept="image/*" multiple />

          <div class="trial-model-panel" aria-label="检测类型">
            <label class="trial-model-option">
              <input type="checkbox" value="裂缝" data-trial-model checked />
              <span><i data-lucide="scan-line" aria-hidden="true"></i>裂缝</span>
            </label>
            <label class="trial-model-option">
              <input type="checkbox" value="剥落" data-trial-model checked />
              <span><i data-lucide="layers-2" aria-hidden="true"></i>剥落</span>
            </label>
          </div>

          <div class="trial-photo-list" id="trial-photo-list" aria-live="polite"></div>

          <div class="trial-actions">
            <button class="button secondary" id="trial-reset-button" type="button">
              <i data-lucide="rotate-ccw" aria-hidden="true"></i>
              重新选择
            </button>
            <button class="button primary" id="trial-generate-button" type="button">
              <i data-lucide="file-sparkles" aria-hidden="true"></i>
              立即生成简易报告
            </button>
          </div>
        </div>

        <aside class="trial-report-panel" id="trial-report-panel">
          <div class="trial-report-empty" id="trial-report-empty">
            <i data-lucide="file-search" aria-hidden="true"></i>
            <h2>等待生成报告</h2>
            <p>选择图片后点击“立即生成简易报告”。</p>
          </div>

          <div class="trial-report-result" id="trial-report-result" hidden>
            <div class="trial-report-head">
              <div>
                <p class="project-kicker">SIMPLE REPORT</p>
                <h2>简易检测报告</h2>
              </div>
              <span id="trial-report-time">--</span>
            </div>

            <div class="trial-report-metrics">
              <div><span>照片数量</span><strong id="trial-report-count">0</strong></div>
              <div><span>检测类型</span><strong id="trial-report-models">裂缝 / 剥落</strong></div>
              <div><span>检测模式</span><strong>标准</strong></div>
            </div>

            <div class="trial-finding-list" id="trial-finding-list"></div>
            <p class="trial-report-note">体验结果不存档、不进入审核、不触发正式检测任务。</p>
          </div>
        </aside>
      </section>
    </main>

    <div class="toast" id="trial-toast" role="status" aria-live="polite"></div>
    <script src="assets/lucide.min.js"></script>
    <script src="script.js?v=20260623-1"></script>
    <script src="ai-experience.js?v=20260625-1"></script>
  </body>
</html>
